name: Build & Deploy

# ───────────────────────────────────────────────────────────────
# Pipeline CI/CD (mismo esquema que HunterVault):
#  1. Construye la imagen Docker (ARM64) con buildx
#  2. La sube a GitHub Container Registry (ghcr.io)
#  3. Conecta por SSH a la VM Oracle y la actualiza con `docker compose pull && up -d`
#
# Se dispara en cada push a main (salvo cambios solo de documentación),
# o manualmente desde la pestaña Actions.
# ───────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.env.example'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/animatch

jobs:
  build-and-push:
    name: Build & Push (ARM64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Oracle VM
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ~/animatch
            echo "──── Pulling latest code (compose) ────"
            git pull --ff-only
            echo "──── Logging into GHCR ────"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "──── Pulling new image ────"
            docker compose pull animatch
            echo "──── Recreating container ────"
            docker compose up -d animatch
            echo "──── Cleaning up old images ────"
            docker image prune -f
            echo "──── Health check ────"
            sleep 5
            docker compose ps animatch
            docker exec huntervault-caddy wget -qO- http://animatch:8080/api/health && echo
